common:
  img_topic: "/left_camera/image"
  lid_topic: "/livox/lidar"
  imu_topic: "/livox/imu"
  img_en: 0
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  extrinsic_T: [0.011, 0.02329, -0.04412]
  extrinsic_R: [1, 0, 0,
                0, 1, 0,
                0, 0, 1]
  Rcl: [1, 0, 0,
        0, 1, 0,
        0, 0, 1]
  Pcl: [0.0, 0.0, 0.0]

time_offset:
  imu_time_offset: 0.0
  img_time_offset: 0.0
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 2
  filter_size_surf: 0.25
  lidar_type: 1
  scan_line: 4
  blind: 0.5

vio:
  max_iterations: 5
  outlier_threshold: 1000
  img_point_cov: 100
  patch_size: 8
  patch_pyrimid_level: 4
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: false

imu:
  imu_en: true
  imu_int_frame: 30
  acc_cov: 0.5
  gyr_cov: 0.3
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001

lio:
  voxel_size: 1.0
  max_layer: 2
  max_points_num: 30

local_map:
  map_sliding_en: false
  half_map_size: 100
  sliding_thresh: 8

uav:
  imu_rate_odom: false
  gravity_align_en: true

publish:
  dense_map_en: false
  pub_effect_point_en: false
  pub_plane_en: false
  pub_scan_num: 2

evo:
  seq_name: "g1_mid360_test"
  pose_output_en: false

pcd_save:
  pcd_save_en: true
  type: 0
  colmap_output_en: false
  filter_size_pcd: 0.4
  interval: -1

image_save:
  img_save_en: false
  interval: 1